version: 1
language: go
scaffold:
  go.mod: |
    module {{name}}
    go 1.23.0
    require (
        go.temporal.io/sdk v1.41.0
        go.temporal.io/sdk/contrib/envconfig v0.1.0
    )
rewrite_imports:
  from: github.com/temporalio/samples-go
  glob: "*.go"
samples:
  - path: helloworld
    description: Basic hello world workflow
    commands:
      - cmd: go mod tidy
      - cmd: go run ./helloworld/worker
      - cmd: go run ./helloworld/starter
        new_terminal: true
  - path: standalone-activity
    description: Execute Activities directly from a Client without a Workflow
    commands:
      - cmd: go mod tidy
      - cmd: go run ./standalone-activity/helloworld/worker
      - cmd: go run ./standalone-activity/helloworld/starter
        new_terminal: true
  - path: nexus
    description: Nexus service definition and cross-namespace operation calls
    commands:
      - cmd: go mod tidy
      - cmd: temporal operator namespace create --namespace my-target-namespace
      - cmd: temporal operator namespace create --namespace my-caller-namespace
      - cmd: >-
          temporal operator nexus endpoint create
          --name my-nexus-endpoint-name
          --target-namespace my-target-namespace
          --target-task-queue my-handler-task-queue
          --description-file ./nexus/service/description.md
      - cmd: go run ./nexus/handler/worker -target-host localhost:7233 -namespace my-target-namespace
      - cmd: go run ./nexus/caller/worker -target-host localhost:7233 -namespace my-caller-namespace
        new_terminal: true
      - cmd: go run ./nexus/caller/starter -target-host localhost:7233 -namespace my-caller-namespace
        new_terminal: true
  - path: nexus-cancelation
    description: Cancel a Nexus operation using WaitRequested cancellation type
    commands:
      - cmd: go mod tidy
      - cmd: temporal operator namespace create --namespace my-target-namespace
      - cmd: temporal operator namespace create --namespace my-caller-namespace
      - cmd: >-
          temporal operator nexus endpoint create
          --name my-nexus-endpoint-name
          --target-namespace my-target-namespace
          --target-task-queue my-handler-task-queue
      - cmd: go run ./nexus-cancelation/handler/worker -target-host localhost:7233 -namespace my-target-namespace
      - cmd: go run ./nexus-cancelation/caller/worker -target-host localhost:7233 -namespace my-caller-namespace
        new_terminal: true
      - cmd: go run ./nexus-cancelation/caller/starter -target-host localhost:7233 -namespace my-caller-namespace
        new_terminal: true
  - path: nexus-context-propagation
    description: Propagate context through client calls, workflows, and Nexus headers
    commands:
      - cmd: go mod tidy
      - cmd: temporal operator namespace create --namespace my-target-namespace
      - cmd: temporal operator namespace create --namespace my-caller-namespace
      - cmd: >-
          temporal operator nexus endpoint create
          --name my-nexus-endpoint-name
          --target-namespace my-target-namespace
          --target-task-queue my-handler-task-queue
      - cmd: go run ./nexus-context-propagation/handler/worker -target-host localhost:7233 -namespace my-target-namespace
      - cmd: go run ./nexus-context-propagation/caller/worker -target-host localhost:7233 -namespace my-caller-namespace
        new_terminal: true
      - cmd: go run ./nexus-context-propagation/caller/starter -target-host localhost:7233 -namespace my-caller-namespace
        new_terminal: true
  - path: nexus-multiple-arguments
    description: Map a Nexus operation to a workflow with multiple input arguments
    commands:
      - cmd: go mod tidy
      - cmd: temporal operator namespace create --namespace my-target-namespace
      - cmd: temporal operator namespace create --namespace my-caller-namespace
